<!DOCTYPE html>

<html class="dark" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#353534",
                        "surface-container-highest": "#353534",
                        "surface-container": "#201f1f",
                        "on-primary": "#3c0091",
                        "on-background": "#e5e2e1",
                        "on-secondary": "#381385",
                        "on-secondary-fixed": "#21005e",
                        "surface-container-low": "#1c1b1b",
                        "outline-variant": "#494454",
                        "inverse-primary": "#6d3bd7",
                        "on-tertiary-fixed-variant": "#474746",
                        "background": "#131313",
                        "tertiary": "#c8c6c5",
                        "surface": "#131313",
                        "on-primary-container": "#340080",
                        "error": "#ffb4ab",
                        "surface-dim": "#131313",
                        "secondary": "#cebdff",
                        "primary-fixed": "#e9ddff",
                        "on-error-container": "#ffdad6",
                        "error-container": "#93000a",
                        "tertiary-container": "#929090",
                        "primary-container": "#a078ff",
                        "on-surface-variant": "#cbc3d7",
                        "inverse-surface": "#e5e2e1",
                        "surface-container-lowest": "#0e0e0e",
                        "on-secondary-container": "#bea8ff",
                        "secondary-fixed-dim": "#cebdff",
                        "outline": "#958ea0",
                        "tertiary-fixed-dim": "#c8c6c5",
                        "surface-tint": "#d0bcff",
                        "surface-container-high": "#2a2a2a",
                        "on-tertiary-container": "#2a2a2a",
                        "inverse-on-surface": "#313030",
                        "tertiary-fixed": "#e5e2e1",
                        "primary": "#d0bcff",
                        "on-tertiary": "#303030",
                        "on-error": "#690005",
                        "on-primary-fixed-variant": "#5516be",
                        "secondary-fixed": "#e8ddff",
                        "on-primary-fixed": "#23005c",
                        "on-tertiary-fixed": "#1b1b1c",
                        "secondary-container": "#4f319c",
                        "surface-bright": "#393939",
                        "on-surface": "#e5e2e1",
                        "primary-fixed-dim": "#d0bcff",
                        "on-secondary-fixed-variant": "#4f319c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "container-max-width": "800px",
                        "bubble-padding-y": "12px",
                        "unit": "8px",
                        "bubble-padding-x": "16px",
                        "margin-desktop": "40px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-sm": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-sm": ["11px", { "lineHeight": "14px", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600" }]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #131313;
            color: #e5e2e1;
            font-family: 'Inter', sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #3F3F46;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #494454;
        }

        .ai-bubble {
            background-color: #1E1E1E;
            border: 1px solid #2D2D2D;
        }

        .user-bubble {
            background-color: #8b5cf6;
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden bg-background">
    <!-- Sidebar -->
    <aside class="w-72 hidden md:flex flex-col bg-surface border-r border-outline-variant shrink-0">
        <div class="p-4 border-b border-outline-variant h-16 flex items-center">
            <span class="font-headline-sm text-headline-sm text-on-surface">Riwi Bot</span>
        </div>
        <div class="p-4">
            <button id="new-chat"
                class="w-full flex items-center justify-center gap-2 py-3 px-4 rounded-xl bg-surface-container-high border border-outline-variant hover:bg-surface-variant transition-colors text-on-surface font-label-md">
                <span class="material-symbols-outlined text-xl">add</span>
                Nuevo Chat
            </button>
        </div>
        <div class="flex-1 overflow-y-auto custom-scrollbar px-3 space-y-1">
            <div class="px-3 py-4 text-outline font-label-sm uppercase tracking-wider">Recientes</div>
            <div id="conversations-container">
                
            </div>
        </div>
        <div class="p-4 mt-auto border-t border-outline-variant">
            <div
                class="flex items-center gap-3 p-2 rounded-lg hover:bg-surface-container transition-colors cursor-pointer">
                <div
                    class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container font-bold text-xs">
                    U</div>
                <div class="flex-1 min-w-0">
                    <p class="font-label-md text-on-surface truncate">Usuario</p>
                    <p class="text-[10px] text-outline truncate">Premium Plan</p>
                </div>
                <span class="material-symbols-outlined text-outline text-xl">settings</span>
            </div>
        </div>
    </aside>
    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 relative h-full">
        <!-- TopAppBar (Mobile & Context) -->
        <header class="bg-surface border-b border-outline-variant flex items-center px-gutter h-16 shrink-0">
            <div class="flex items-center gap-3 md:hidden">
                <span class="material-symbols-outlined text-on-surface">menu</span>
                <span class="font-headline-sm text-headline-sm text-on-surface">Mindful AI</span>
            </div>
            <div class="hidden md:flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-surface-container-high">
                <span class="w-2 h-2 rounded-full bg-green-500"></span>
                <span class="font-label-sm text-label-sm text-on-surface-variant">Online</span>
            </div>
            <div class="ml-auto flex items-center gap-4">
                <span class="hidden md:block text-primary font-bold font-label-md">Chat</span>
                <span
                    class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:text-on-surface">more_vert</span>
            </div>
        </header>
        <!-- Messages Area -->
        <main class="flex-1 overflow-y-auto custom-scrollbar relative">
            <div class="w-full h-full max-w-container-max-width mx-auto px-gutter py-margin-desktop flex flex-col gap-6"
                id="messages-container">

                <div class="flex h-full w-100 justify-center items-center">
                    <div class="p-4 text-center">
                        <h4 class="font-bold text-xl">¿En qué puedo ayudarte?</h4>
                        <p>pregunta lo que quieras</p>
                    </div>

                </div>

            </div>
        </main>
        <!-- Input Area -->
        <div
            class="shrink-0 bg-gradient-to-t from-background via-background/95 to-transparent pt-10 pb-gutter px-gutter">
            <div class="max-w-container-max-width mx-auto relative">
                <form id="form-message">
                    <div
                        class="flex items-center gap-3 p-2 bg-[#1E1E1E] border border-[#2D2D2D] rounded-xl focus-within:border-[#8b5cf6] focus-within:ring-1 focus-within:ring-[#8b5cf6]/30 transition-all duration-200 group">
                        <input
                            class="flex-1 bg-transparent border-none focus:ring-0 text-body-lg font-body-lg py-3 px-4 resize-none placeholder-outline text-on-surface"
                            placeholder="Escribe un mensaje..." rows="1"></input>
                        <button
                            class="flex items-center justify-center h-11 w-11 rounded-lg bg-[#8b5cf6] text-white hover:bg-[#7c3aed] transition-all active:scale-95 group-focus-within:shadow-[0_0_12px_rgba(139,92,246,0.4)]">
                            <span class="material-symbols-outlined" data-icon="send">send</span>
                        </button>
                    </div>
                </form>
                <div class="mt-2 text-center">
                    <span class="font-label-sm text-label-sm text-outline-variant">Presiona Enter para enviar</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
